name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos-desktop:
    runs-on: macos-latest
    env:
      UV_CACHE_DIR: .uv-cache
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.12"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.8.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate desktop release tag
        run: uv run python scripts/check_desktop_release_version.py --tag "${GITHUB_REF_NAME}"

      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile

      - name: Run desktop frontend tests
        run: pnpm --dir apps/desktop test

      - name: Run desktop Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test

      - name: Materialize App Store Connect API key
        if: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_P8 != '' }}
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Validate signing and notarization secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          api_auth_ready=0
          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -n "${APPLE_API_KEY_PATH:-}" ]; then
            api_auth_ready=1
          fi

          apple_id_auth_ready=0
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            apple_id_auth_ready=1
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required signing secret(s): ${missing[*]}" >&2
            exit 1
          fi

          if [ "$api_auth_ready" -ne 1 ] && [ "$apple_id_auth_ready" -ne 1 ]; then
            echo "Missing notarization credentials. Configure either APPLE_API_KEY + APPLE_API_ISSUER + APPLE_API_KEY_P8 or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID." >&2
            exit 1
          fi

      - name: Build signed macOS desktop app bundle
        run: pnpm --dir apps/desktop exec tauri build --bundles app --ci

      - name: Verify codesign
        run: codesign --verify --deep --strict "apps/desktop/src-tauri/target/release/bundle/macos/Loom Desktop.app"

      - name: Smoke-test bundled macOS desktop runtime
        run: env UV_CACHE_DIR=.uv-cache uv run python scripts/smoke_macos_desktop_bundle.py --app-bundle "apps/desktop/src-tauri/target/release/bundle/macos/Loom Desktop.app"

      - name: Build release DMG
        run: bash scripts/build_macos_desktop_dmg.sh --app-bundle "apps/desktop/src-tauri/target/release/bundle/macos/Loom Desktop.app" --output "apps/desktop/src-tauri/target/release/bundle/dmg/Loom Desktop.dmg" --volume-name "Loom Desktop"

      - name: Codesign DMG
        run: codesign --force --sign "${APPLE_SIGNING_IDENTITY}" "apps/desktop/src-tauri/target/release/bundle/dmg/Loom Desktop.dmg"

      - name: Notarize DMG with App Store Connect API key
        if: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_P8 != '' }}
        run: xcrun notarytool submit "apps/desktop/src-tauri/target/release/bundle/dmg/Loom Desktop.dmg" --key "${APPLE_API_KEY_PATH}" --key-id "${APPLE_API_KEY}" --issuer "${APPLE_API_ISSUER}" --wait

      - name: Notarize DMG with Apple ID
        if: ${{ !(secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_P8 != '') }}
        run: xcrun notarytool submit "apps/desktop/src-tauri/target/release/bundle/dmg/Loom Desktop.dmg" --apple-id "${APPLE_ID}" --password "${APPLE_PASSWORD}" --team-id "${APPLE_TEAM_ID}" --wait

      - name: Staple DMG notarization ticket
        run: xcrun stapler staple "apps/desktop/src-tauri/target/release/bundle/dmg/Loom Desktop.dmg"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
